# ═══════════════════════════════════════════════════════════════════════════
# EXAMPLE cv_data.yaml — a fully fictional persona ("Alex Berger", sustainability
# / ESG consulting, Berlin) used to prove this template works for a field and
# city completely unlike the one it was originally built for. None of this is
# real. /setup will build YOUR version of this file from your own uploaded CV
# plus a short cover-letter interview — you shouldn't need to hand-edit this,
# it's here so you (or Claude) can see a fully-populated example.
# ═══════════════════════════════════════════════════════════════════════════

