# ═══════════════════════════════════════════════════════════════════════════
# CV VARIANT ROUTING — which config_*.yaml file to use per search profile.
# /setup creates one CV variant per job-search profile you configure.
# ═══════════════════════════════════════════════════════════════════════════
profile_config_map:
  consulting: "config_consulting.yaml"
  policy: "config_policy.yaml"

# ═══════════════════════════════════════════════════════════════════════════
# SUMMARY TEMPLATES — the "About Me" pattern: "I am a [X] with a focus on [Y].
# In [Z] I [did W]. I am motivated to [...] and bring [...]." One per variant,
# with {company} and {role_area} filled in per job.
# ═══════════════════════════════════════════════════════════════════════════
summary_templates:
  consulting: >
    Sustainability & Environmental Management graduate from TU Berlin with hands-on
    experience in ESG reporting, carbon accounting, and client-facing sustainability
    consulting. Motivated to bring that foundation to {company}'s work in {role_area}.
  policy:  >
    Sustainability & Environmental Management graduate from TU Berlin with a research
    and policy background in EU climate regulation and corporate emissions reporting.
    Interested in contributing to {company}'s work in {role_area}.

summary_targeting_suffix: " Currently targeting {title} positions where analytical rigor and climate-policy fluency add direct value."

role_area_signals:
  - keywords: ["esg", "carbon", "emissions", "csrd", "reporting"]
    label: "ESG and carbon reporting"
  - keywords: ["policy", "regulation", "eu climate"]
    label: "climate policy"
  - keywords: ["renewable", "wind", "solar", "energy"]
    label: "renewable energy"
role_area_default: "sustainability and environmental management"

