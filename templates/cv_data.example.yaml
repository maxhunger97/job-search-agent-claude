  title: MSc Sustainability & Environmental Management
  email: alex.berger.example@example.com
  phone: "+49 30 0000 0000"
  linkedin: linkedin.com/in/alexberger-example
  nationality: German
  photo: ""   # leave empty to omit photo from the CV

education:
  - degree: MSc Sustainability & Environmental Management
    institution: Technical University Berlin
    period: "2022 – 2024"
    grade: "1.3 (German scale)"
  - degree: BSc Environmental Engineering
    institution: University of Hamburg
    period: "2018 – 2022"

experience:
  - title: Junior ESG Analyst
    company: Berlin Climate Consulting GmbH
    period: "11/2024 – present"
    description: >
      Support corporate carbon accounting and ESG reporting mandates for mid-cap clients.
      Build emissions inventories, benchmark against CSRD requirements, and prepare
      client-facing sustainability reports.
  - title: Sustainability Intern
    company: Windkraft Nord AG
    period: "04/2024 – 10/2024"
